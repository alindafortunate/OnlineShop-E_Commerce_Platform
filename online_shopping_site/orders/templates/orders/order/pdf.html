<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My shop</title>
</head>
<body>
<h1>My Shop</h1>
<p>
Invoice no. {{order.id}} <br>
<span class = 'secondary'>
{{order.created|date:"M d, Y"}}
</span>
</p>
   <h3>Bill to</h3> 
   <p>
   {{order.first_name}} {{order.last_name}} <br>
   {{order.email}} <br>
   {{order.address}} <br>
   {{order.postal_code}}, {{order.city}}
   </p>
   <h3>Items Bought.</h3>
   <table>
   <thead>
   <tr>
   <th>Product</th>
   <th>Price</th>
   <th>Quantity</th>
   <th>Cost</th>
   </tr>
   </thead>
   </table>
</body>
</html>
